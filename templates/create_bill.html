{% extends 'layout.html' %}

{% block content %}
<div class="container">
    <h2>Tạo hóa đơn cho hợp đồng #{{ contract.id }}</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="month" class="form-label">Tháng (YYYY-MM)</label>
            <input type="month" class="form-control" id="month" name="month" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Đơn giá điện trung bình tháng này (chưa VAT)</label>
            <input type="text" value="{{ '{:,.0f}'.format(average_price_preview) }} đ/kWh" class="form-control" readonly>
            <small class="text-muted">Tính từ tổng điện toàn nhà theo bậc EVN. Nếu 0, vui lòng nhập tổng điện tháng trước.</small>
        </div>
        <div class="mb-3">
            <label for="electricity_old" class="form-label">Chỉ số điện cũ</label>
            <input type="number" step="0.01" class="form-control" id="electricity_old" name="electricity_old" value="{% if last_bill %}{{ last_bill.electricity_new }}{% else %}0{% endif %}" required>
        </div>
        <div class="mb-3">
            <label for="electricity_new" class="form-label">Chỉ số điện mới</label>
            <input type="number" step="0.01" class="form-control" id="electricity_new" name="electricity_new" required>
        </div>
        <div class="mb-3">
            <label for="water_old" class="form-label">Chỉ số nước cũ</label>
            <input type="number" step="0.01" class="form-control" id="water_old" name="water_old" value="{% if last_bill %}{{ last_bill.water_new }}{% else %}0{% endif %}" required>
        </div>
        <div class="mb-3">
            <label for="water_new" class="form-label">Chỉ số nước mới</label>
            <input type="number" step="0.01" class="form-control" id="water_new" name="water_new" required>
        </div>
        <button type="submit" class="btn btn-primary">Tạo hóa đơn</button>
    </form>
</div>
{% endblock %}
